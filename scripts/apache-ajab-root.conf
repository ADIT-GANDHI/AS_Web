# Apache vhost for ajab.damnetworks.com (root static export)
# Copy to: /etc/apache2/sites-available/ajab.damnetworks.com.conf

<VirtualHost *:80>
    ServerName ajab.damnetworks.com
    ServerAlias 167.71.230.29

    DocumentRoot /var/www/ajab

    RewriteEngine On

    # Next.js static assets — never rewrite to HTML
    RewriteRule ^_next/ - [L]

    # Real files
    RewriteCond %{REQUEST_FILENAME} -f
    RewriteRule ^ - [L]

    # /songs -> songs.html
    RewriteCond %{DOCUMENT_ROOT}/$1.html -f
    RewriteRule ^(.+?)/?$ $1.html [L]

    # /songs/details/223 -> /songs/details/0.html
    RewriteCond %{REQUEST_URI} !^/_next/
    RewriteCond %{REQUEST_URI} ^/(.+)/[^./]+/?$
    RewriteCond %{DOCUMENT_ROOT}/%1/0.html -f
    RewriteRule ^(.+)/[^./]+/?$ $1/0.html [L]

    # SPA fallback (not for .js/.css etc.)
    RewriteCond %{REQUEST_URI} !\.(js|css|png|jpg|jpeg|gif|svg|webp|ico|woff2?|ttf|eot|map|json|txt)$
    RewriteRule ^ /index.html [L]

    <Directory /var/www/ajab>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ajab-error.log
    CustomLog ${APACHE_LOG_DIR}/ajab-access.log combined
</VirtualHost>
